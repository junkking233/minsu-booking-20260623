services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: fullstack-app-backend
    ports:
      - "8888:8888"
    environment:
      SERVER_PORT: 8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-docker:3306/template_db?useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-fullstack-app-starter-token-secret}
      AUTH_TOKEN_TTL_SECONDS: 86400
    networks:
      - app-network
      - shared-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: fullstack-app-frontend
    ports:
      - "9999:9999"
    environment:
      VITE_PROXY_BACKEND: http://backend:8888
      VITE_PROXY_AI: http://ai-service:8000
    depends_on:
      - backend
      - ai-service
    networks:
      - app-network

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: fullstack-app-ai-service
    ports:
      - "8000:8000"
    env_file:
      - path: ./apps/ai-service/.env
        required: false
    environment:
      AI_CORS_ORIGINS: http://localhost:9999,http://127.0.0.1:9999
    networks:
      - app-network

networks:
  app-network:
  shared-network:
    external: true
