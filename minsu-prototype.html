function availability(h, opts={}){
  const guests=Number(opts.guests ?? App.search.guests);
  const checkIn=opts.checkIn ?? App.search.checkIn;
  const checkOut=opts.checkOut ?? App.search.checkOut;
  if(!h) return {ok:false,reason:'房源不存在'};
  if(h.status!=='上架') return {ok:false,reason:'房源已下架'};
  if(!checkIn||!checkOut||dateDiff(checkIn,checkOut)<1) return {ok:false,reason:'请选择有效入住日期'};
  if(guests>h.capacity) return {ok:false,reason:'入住人数超过上限'};
  const days=datesBetween(checkIn,checkOut);
  if(days.some(d=>(availabilityLocks[h.id]||[]).includes(d))) return {ok:false,reason:'所选日期存在锁定房态'};

function renderProfile(){
  if(!ensureUserLogin()) return `<div class="empty">请先登录</div>`; const u=getCurrentUser(); const userOrders=orders.filter(o=>o.userId===u.id); const stats=[['全部订单',userOrders.length,()=>{App.orderTab='全部';goUser('orders')}],['待支付',userOrders.filter(o=>o.status==='待支付').length,()=>{App.orderTab='待支付';goUser('orders')}],['已完成',userOrders.filter(o=>o.status==='已完成').length,()=>{App.orderTab='已完成';goUser('orders')}],['收藏房源',favoriteSet.size,()=>goUser('favorites')]];
  return `<div class="card pad"><div class="profile-head"><div class="avatar">${esc(u.avatar||u.name[0])}</div><div><h1 class="mb0">${esc(u.name)}</h1><p class="muted">用户名：${esc(u.username)} · 手机：${maskPhone(u.phone)} · 注册：${u.regTime}</p></div><button class="btn primary" onclick="showEditProfile()">编辑资料</button></div></div><section class="section stat-grid">${stats.map(s=>`<div class="stat" onclick="(${s[2]})()"><div class="label">${s[0]}</div><div class="num">${s[1]}</div><div class="sub">点击查看</div></div>`).join('')}</section><section class="section grid cols-3"><button class="mini-card" onclick="showToast('优惠券为占位展示，优惠由系统配置统一驱动','warn')"><b>🎟️ 优惠券</b><p class="muted">占位入口</p></button><button class="mini-card" onclick="showToast('联系客服为占位入口，当前不接入消息服务','warn')"><b>🎧 联系客服</b><p class="muted">占位入口</p></button><button class="mini-card" onclick="userLogout()"><b>🚪 退出登录</b><p class="muted">切换到游客状态</p></button></section>`;
}
function showEditProfile(){const u=getCurrentUser();showModal('编辑资料（原型）',`<div class="grid cols-2"><div class="field"><label>昵称</label><input id="editName" value="${esc(u.name)}"></div><div class="field"><label>备用手机号</label><input id="editPhone" value="${esc(u.phone)}"></div></div><div class="hint mt16">登录仍使用用户名+密码，手机号仅作为订单联系备用。</div>`,`<button class="btn ghost" onclick="closeModal()">取消</button><button class="btn primary" onclick="saveProfile()">保存</button>`)}
function saveProfile(){const u=getCurrentUser();const phone=$('editPhone').value.trim();if(phone&&!/^1\d{10}$/.test(phone)){showToast('手机号格式不正确','err');return}u.name=$('editName').value.trim()||u.name;u.phone=phone;closeModal();showToast('资料已保存');render(false)}
function renderFavorites(){
  if(!ensureUserLogin()) return `<div class="empty">请先登录</div>`; const favs=houses.filter(h=>favoriteSet.has(h.id)); const p=paginate(favs,App.favPage,20); App.favPage=p.page;
  return `<div class="page-title"><div><h1>我的收藏</h1><p>收藏/取消收藏实时更新，点击房源可查看详情或直接预约。</p></div><button class="btn ghost" onclick="goUser('houses')">去收藏更多</button></div><div class="house-grid">${p.items.length?p.items.map((h,i)=>houseCard(h,i)).join(''):`<div class="empty"><div class="big">♡</div>暂无收藏房源</div>`}</div>${paginationHtml('favorites',p.page,p.total)}`;
}
function showLoginModal(){showModal('用户登录 / 注册',`<div class="hint">演示账号：demo / 123456。注册仅需要用户名和密码，手机号不作为登录条件。</div><div class="grid mt16"><div class="field"><label>用户名</label><input id="loginUser" value="demo"></div><div class="field"><label>密码</label><input id="loginPass" type="password" value="123456"></div></div>`,`<button class="btn ghost" onclick="closeModal()">取消</button><button class="btn soft" onclick="registerUser()">快速注册</button><button class="btn primary" onclick="userLogin()">登录</button>`,'sm')}
function userLogin(){const name=$('loginUser').value.trim();const pass=$('loginPass').value;const u=users.find(x=>x.username===name&&x.password===pass);if(!u){showToast('用户名或密码错误','err');return}if(u.status==='禁用'){showToast('账号已被禁用','err');return}App.currentUserId=u.id;App.userLogged=true;closeModal();showToast('登录成功');render(false)}
function registerUser(){const name=$('loginUser').value.trim();const pass=$('loginPass').value;if(!name||!pass){showToast('用户名和密码不能为空','err');return}if(users.some(u=>u.username===name)){showToast('用户名已存在，可直接登录','warn');return}const u={id:users.length+1,username:name,password:pass,name:name,phone:'',avatar:name[0]||'新',status:'正常',regTime:today,orderCount:0};users.push(u);App.currentUserId=u.id;App.userLogged=true;closeModal();showToast('注册并登录成功');render(false)}
function userLogout(){App.userLogged=false;showToast('已退出用户登录');goUser('home')}
function renderAdminLogin(){return `<div class="login-wrap"><div class="login-card"><div class="brand"><div class="brand-mark">管</div><span>后台管理员登录</span></div><p class="muted">后台所有页面需要登录鉴权。单一管理员账号：admin / 123456。</p><div class="grid mt20"><div class="field"><label>用户名</label><input id="adminUser" value="admin"></div><div class="field"><label>密码</label><input id="adminPass" type="password" value="123456"></div><button class="btn primary full" onclick="adminLogin()">登录后台</button><button class="btn ghost full" onclick="fillAdminDemo()">填入演示账号</button></div></div></div>`}
function fillAdminDemo(){$('adminUser').value='admin';$('adminPass').value='123456';showToast('已填入演示账号')}
function adminLogin(){const u=$('adminUser').value.trim(),p=$('adminPass').value;if(u==='admin'&&p==='123456'){App.adminLogged=true;App.adminPage='dashboard';showToast('后台登录成功');render()}else showToast('后台账号或密码错误','err')}
function adminLogout(){App.adminLogged=false;App.adminPage='login';showToast('已退出后台');render()}
function paidRevenue(){return orders.filter(o=>o.paid&&['已预订','入住中','已完成','已评价'].includes(o.status)).reduce((s,o)=>s+o.amount,0)}
function renderDashboard(){
  const metrics=[['总房源数',houses.length,'全部房源','houses'],['今日订单',orders.filter(o=>o.createTime.startsWith(today)).length,'按创建日期统计','orders'],['待处理订单',orders.filter(o=>['待确认','退款中'].includes(o.status)).length,'待确认 + 退款中','orders-pending'],['总收入',money(paidRevenue()),'paid=true 且状态正常','orders-paid'],['上架房源',houses.filter(h=>h.status==='上架').length,'可在用户端展示','houses-online'],['平均评分',(houses.reduce((s,h)=>s+h.rating,0)/houses.length).toFixed(1),'房源均值','reviews'],['注册用户',users.length,'含禁用用户','users'],['收藏次数',favoriteSet.size,'实时统计','favorites']];
  const trend=[2,5,3,7,4,6,3],days=['6/17','6/18','6/19','6/20','6/21','6/22','6/23'];
  const pending=orders.filter(o=>['待确认','退款中'].includes(o.status));
  return `<div class="page-title"><div><h1>数据看板</h1><p>展示核心运营指标、近7日订单趋势与待处理订单。</p></div><button class="btn primary" onclick="goAdmin('orders')">处理订单</button></div><section class="stat-grid">${metrics.map(m=>`<div class="stat" onclick="dashboardJump('${m[3]}')"><div class="label">${m[0]}</div><div class="num">${m[1]}</div><div class="sub">${m[2]}</div></div>`).join('')}</section><section class="section grid cols-2"><div><div class="section-head"><div><h2>近7日订单趋势</h2><p>柱状图可点击查看当日数据。</p></div></div><div class="chart">${trend.map((v,i)=>`<div class="bar" style="height:${v*24}px" onclick="showToast('${days[i]} 有 ${v} 个订单')"><b>${v}</b><span>${days[i]}</span></div>`).join('')}</div></div><div class="card pad"><div class="between"><h2>待处理订单</h2><button class="btn ghost small" onclick="dashboardJump('orders-pending')">查看全部</button></div><div class="list-stack mt12">${pending.length?pending.map(o=>`<div class="mini-card"><div class="between"><b>${o.orderNo}</b>${statusPill(o.status)}</div><p class="muted">${getHouse(o.houseId)?.name||'房源已删除'} · ${o.guestName}</p><div class="row right">${adminOrderActionButtons(o)}</div></div>`).join(''):'<div class="empty">暂无待处理订单</div>'}</div></div></section>`;
}
function dashboardJump(key){ if(key==='houses'){goAdmin('houses')} if(key==='houses-online'){App.adminFilters.houseStatus='上架';goAdmin('houses')} if(key==='orders'||key==='orders-paid'){goAdmin('orders')} if(key==='orders-pending'){App.adminFilters.orderStatus='待确认';goAdmin('orders')} if(key==='reviews'){goAdmin('reviews')} if(key==='users'){goAdmin('users')} if(key==='favorites'){switchMode('user');goUser('favorites')} }
function renderAdminHouses(){
  const kw=App.adminFilters.houseKeyword.toLowerCase(); let list=houses.filter(h=>(!kw||[h.name,h.city,h.host,h.address].join(' ').toLowerCase().includes(kw))&&(App.adminFilters.houseStatus==='全部'||h.status===App.adminFilters.houseStatus)); const p=paginate(list,App.adminPages.houses,20); App.adminPages.houses=p.page;
  return `<div class="page-title"><div><h1>房源管理</h1><p>支持关键词/状态筛选，新增、编辑、上下架、删除，并跳转房态维护。</p></div><button class="btn primary" onclick="showHouseModal()">＋ 新增房源</button></div><div class="filter-panel"><div class="grid cols-4"><div class="field"><label>关键词</label><input id="adminHouseKw" value="${esc(App.adminFilters.houseKeyword)}" placeholder="名称/城市/房东/地址"></div><div class="field"><label>状态</label><select id="adminHouseStatus"><option>全部</option><option ${App.adminFilters.houseStatus==='上架'?'selected':''}>上架</option><option ${App.adminFilters.houseStatus==='下架'?'selected':''}>下架</option></select></div><div class="field"><label>&nbsp;</label><button class="btn primary" onclick="applyAdminHouseFilters()">筛选</button></div><div class="field"><label>&nbsp;</label><button class="btn ghost" onclick="App.adminFilters.houseKeyword='';App.adminFilters.houseStatus='全部';render(false)">重置</button></div></div></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>房源</th><th>城市</th><th>价格</th><th>类型</th><th>容量</th><th>评分</th><th>状态</th><th>操作</th></tr></thead><tbody>${p.items.map(h=>`<tr><td>${h.id}</td><td><b>${h.name}</b><br><span class="muted">${h.host}</span></td><td>${h.city}</td><td>${money(h.price)}</td><td>${h.type}</td><td>${h.capacity}人</td><td>⭐ ${h.rating}</td><td><span class="tag ${h.status==='上架'?'green':'red'}">${h.status}</span></td><td><div class="row"><button class="btn blue small" onclick="showHouseModal(${h.id})">编辑</button><button class="btn ${h.status==='上架'?'amber':'green'} small" onclick="toggleHouseStatus(${h.id})">${h.status==='上架'?'下架':'上架'}</button><button class="btn purple small" onclick="goAvailability(${h.id})">房态</button><button class="btn red small" onclick="deleteHouse(${h.id})">删除</button></div></td></tr>`).join('')}</tbody></table></div>${paginationHtml('houses',p.page,p.total)}`;
}
function applyAdminHouseFilters(){App.adminFilters.houseKeyword=$('adminHouseKw').value.trim();App.adminFilters.houseStatus=$('adminHouseStatus').value;App.adminPages.houses=1;render(false)}
function showHouseModal(id){
  const isEdit=!!id; const h=isEdit?getHouse(id):{name:'',city:config.cities[0],price:399,cleanFee:50,type:'一居室',rooms:'1室1厅1卫',area:'55㎡',capacity:2,address:'',host:'',status:'上架',facilities:['WiFi','空调'],desc:'',rule:'',emoji:'🏡'};
  showModal(isEdit?'编辑房源':'新增房源',`<div class="grid cols-2"><div class="field"><label>房源名称 *</label><input id="hName" value="${esc(h.name)}"></div><div class="field"><label>所在城市</label><select id="hCity">${config.cities.map(c=>`<option ${h.city===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="field"><label>每晚价格</label><input id="hPrice" type="number" value="${h.price}"></div><div class="field"><label>清洁费</label><input id="hClean" type="number" value="${h.cleanFee}"></div><div class="field"><label>房源类型</label><select id="hType">${['单间','一居室','两居室','整套'].map(t=>`<option ${h.type===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="field"><label>可住人数</label><input id="hCapacity" type="number" value="${h.capacity}"></div><div class="field"><label>房间数量</label><input id="hRooms" value="${esc(h.rooms)}"></div><div class="field"><label>面积</label><input id="hArea" value="${esc(h.area)}"></div><div class="field"><label>房东姓名 *</label><input id="hHost" value="${esc(h.host)}"></div><div class="field"><label>状态</label><select id="hStatus"><option ${h.status==='上架'?'selected':''}>上架</option><option ${h.status==='下架'?'selected':''}>下架</option></select></div></div><div class="field mt12"><label>详细地址 *</label><input id="hAddress" value="${esc(h.address)}"></div><div class="field mt12"><label>配套设施</label><div class="check-list">${config.tags.map(t=>`<label class="check-tag"><input type="checkbox" name="hFac" value="${t}" ${(h.facilities||[]).includes(t)?'checked':''}>${t}</label>`).join('')}</div></div><div class="grid cols-2 mt12"><div class="field"><label>房源介绍</label><textarea id="hDesc">${esc(h.desc)}</textarea></div><div class="field"><label>入住规则</label><textarea id="hRule">${esc(h.rule)}</textarea></div></div><label class="file-drop mt12"><input id="hCover" type="file" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="showToast('已选择封面图片：'+this.files[0]?.name)">🖼️ 点击上传真实封面图片（原型记录文件名）</label>`, `<button class="btn ghost" onclick="closeModal()">取消</button><button class="btn primary" onclick="saveHouse(${isEdit?id:'null'})">保存</button>`);
}
function saveHouse(id){const name=$('hName').value.trim(),address=$('hAddress').value.trim(),host=$('hHost').value.trim(); if(!name||!address||!host){showToast('房源名称、地址、房东姓名为必填','err');return} const fac=[...document.querySelectorAll('input[name="hFac"]:checked')].map(x=>x.value); const data={name,city:$('hCity').value,price:Number($('hPrice').value||0),cleanFee:Number($('hClean').value||0),type:$('hType').value,rooms:$('hRooms').value,area:$('hArea').value,capacity:Number($('hCapacity').value||1),address,host,status:$('hStatus').value,facilities:fac,desc:$('hDesc').value,rule:$('hRule').value}; if(id){Object.assign(getHouse(id),data);showToast('房源已更新')}else{houses.unshift({id:Math.max(...houses.map(h=>h.id))+1,...data,rating:4.8,sales:0,emoji:'🏡'});showToast('房源已新增')} closeModal();render(false)}
function toggleHouseStatus(id){const h=getHouse(id);h.status=h.status==='上架'?'下架':'上架';showToast(`已${h.status}`);render(false)}
function deleteHouse(id){confirmAction('确认删除该房源？删除后将同步清除收藏记录；历史订单展示“房源已删除”。',()=>{const idx=houses.findIndex(h=>h.id===id);if(idx>=0)houses.splice(idx,1);favoriteSet.delete(id);showToast('房源已删除');render(false)})}
function goAvailability(id){App.adminHouseId=id;App.adminPage='availability';render()}
function renderAvailability(){
  const h=getHouse(App.adminHouseId)||houses[0]; App.adminHouseId=h.id; const [y,m]=App.adminMonth.split('-').map(Number); const first=new Date(y,m-1,1); const startBlank=first.getDay(); const days=new Date(y,m,0).getDate(); let cells=[]; for(let i=0;i<startBlank;i++)cells.push('<div class="day-cell blank"></div>'); for(let d=1;d<=days;d++){const date=`${App.adminMonth}-${String(d).padStart(2,'0')}`;const st=getDateStatus(h.id,date);cells.push(`<div class="day-cell ${st==='锁定'?'locked':st==='已订'?'booked':''}" onclick="toggleDateState(${h.id},'${date}')"><div class="day-num">${d}</div><div class="day-status">${st}</div>${st==='已订'?`<small class="muted">${getBookedOrder(h.id,date)?.orderNo||''}</small>`:''}</div>`)}
  return `<div class="page-title"><div><h1>房态维护</h1><p>点击日期切换“可订/锁定”；已订日期由订单占用自动标记，不可手动修改。</p></div><button class="btn ghost" onclick="goAdmin('houses')">返回房源管理</button></div><div class="filter-panel"><div class="grid cols-4"><div class="field"><label>选择房源</label><select id="availHouse" onchange="App.adminHouseId=Number(this.value);render(false)">${houses.map(x=>`<option value="${x.id}" ${x.id===h.id?'selected':''}>${x.name}</option>`).join('')}</select></div><div class="field"><label>月份</label><input id="availMonth" type="month" value="${App.adminMonth}" onchange="App.adminMonth=this.value;render(false)"></div><div class="field"><label>&nbsp;</label><button class="btn ghost" onclick="changeMonth(-1)">上月</button></div><div class="field"><label>&nbsp;</label><button class="btn ghost" onclick="changeMonth(1)">下月</button></div></div></div><div class="card pad"><div class="between"><h2>${h.name} · ${App.adminMonth}</h2><div class="tags"><span class="tag green">可订</span><span class="tag amber">锁定</span><span class="tag red">已订</span></div></div><div class="calendar-grid mt16">${['日','一','二','三','四','五','六'].map(w=>`<div class="weekday">${w}</div>`).join('')}${cells.join('')}</div></div>`;
}
function changeMonth(delta){let [y,m]=App.adminMonth.split('-').map(Number);m+=delta;while(m<1){m+=12;y--}while(m>12){m-=12;y++}App.adminMonth=y+'-'+String(m).padStart(2,'0');render(false)}
function toggleDateState(hid,date){const st=getDateStatus(hid,date); if(st==='已订'){showToast('已订日期不能直接修改','warn');return} availabilityLocks[hid]=availabilityLocks[hid]||[]; if(st==='锁定'){availabilityLocks[hid]=availabilityLocks[hid].filter(d=>d!==date);showToast(date+' 已恢复可订')}else{availabilityLocks[hid].push(date);showToast(date+' 已锁定')} render(false)}
function renderAdminOrders(){
  const f=App.adminFilters; let list=orders.filter(o=>{const h=getHouse(o.houseId),u=getUser(o.userId);return (!f.orderKeyword||o.orderNo.includes(f.orderKeyword))&&(!f.orderHouse||((h?.name||'').includes(f.orderHouse)))&&(!f.orderUser||((u?.name||o.guestName).includes(f.orderUser)||o.guestName.includes(f.orderUser)))&&(!f.orderPhone||o.phone.includes(f.orderPhone))&&(f.orderStatus==='全部'||o.status===f.orderStatus)}); const p=paginate(list,App.adminPages.orders,20); App.adminPages.orders=p.page;
  return `<div class="page-title"><div><h1>订单管理</h1><p>支持订单号、房源、用户、手机号、状态多维筛选与状态流转。</p></div><button class="btn ghost" onclick="App.adminFilters.orderStatus='全部';render(false)">查看全部</button></div><div class="filter-panel"><div class="grid cols-4"><div class="field"><label>订单号</label><input id="admOrderNo" value="${esc(f.orderKeyword)}"></div><div class="field"><label>房源</label><input id="admOrderHouse" value="${esc(f.orderHouse)}"></div><div class="field"><label>用户</label><input id="admOrderUser" value="${esc(f.orderUser)}"></div><div class="field"><label>手机号</label><input id="admOrderPhone" value="${esc(f.orderPhone)}"></div><div class="field"><label>状态</label><select id="admOrderStatus">${adminStatusTabs.map(s=>`<option ${f.orderStatus===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="field"><label>&nbsp;</label><button class="btn primary" onclick="applyAdminOrderFilters()">筛选订单</button></div><div class="field"><label>&nbsp;</label><button class="btn ghost" onclick="resetAdminOrderFilters()">重置</button></div></div></div><div class="table-wrap"><table><thead><tr><th>订单号</th><th>房源/用户</th><th>入住</th><th>金额</th><th>支付</th><th>状态</th><th>操作</th></tr></thead><tbody>${p.items.map(o=>`<tr><td><b>${o.orderNo}</b><br><span class="muted">${o.createTime}</span></td><td>${getHouse(o.houseId)?.name||'房源已删除'}<br><span class="muted">${o.guestName} · ${maskPhone(o.phone)}</span></td><td>${o.checkIn} 至 ${o.checkOut}<br><span class="muted">${o.nights}晚 ${o.guests}人</span></td><td>${money(o.amount)}</td><td><span class="tag ${o.paid?'green':'gray'}">${o.paid?'已支付':'未支付'}</span></td><td>${statusPill(o.status)}</td><td><div class="row"><button class="btn ghost small" onclick="showAdminOrderDetail('${o.orderNo}')">详情</button>${adminOrderActionButtons(o)}</div></td></tr>`).join('')}</tbody></table></div>${paginationHtml('adminOrders',p.page,p.total)}`;
}
function applyAdminOrderFilters(){const f=App.adminFilters;f.orderKeyword=$('admOrderNo').value.trim();f.orderHouse=$('admOrderHouse').value.trim();f.orderUser=$('admOrderUser').value.trim();f.orderPhone=$('admOrderPhone').value.trim();f.orderStatus=$('admOrderStatus').value;App.adminPages.orders=1;render(false)}
function resetAdminOrderFilters(){Object.assign(App.adminFilters,{orderKeyword:'',orderHouse:'',orderUser:'',orderPhone:'',orderStatus:'全部'});render(false)}
function adminOrderActionButtons(o){let b=''; if(o.status==='待确认') b+=`<button class="btn green small" onclick="adminSetOrder('${o.orderNo}','待支付',false)">确认</button><button class="btn red small" onclick="adminSetOrder('${o.orderNo}','已取消',false)">拒绝</button>`; if(o.status==='待支付') b+=`<button class="btn red small" onclick="adminSetOrder('${o.orderNo}','已取消',false)">取消</button>`; if(o.status==='已预订') b+=`<button class="btn blue small" onclick="adminSetOrder('${o.orderNo}','入住中',true)">办理入住</button><button class="btn amber small" onclick="adminSetOrder('${o.orderNo}','退款中',true)">退款申请</button>`; if(o.status==='入住中') b+=`<button class="btn green small" onclick="adminSetOrder('${o.orderNo}','已完成',true)">完成</button>`; if(o.status==='退款中') b+=`<button class="btn red small" onclick="adminSetOrder('${o.orderNo}','已退款',false)">同意退款</button><button class="btn green small" onclick="adminSetOrder('${o.orderNo}','已预订',true)">拒绝退款</button>`; return b}
function adminSetOrder(no,status,paid){confirmAction(`确认将订单 ${no} 变更为“${status}”？`,()=>{const o=getOrder(no);if(o){o.status=status;o.paid=paid;showToast('订单状态已更新');render(false)}})}
function showAdminOrderDetail(no){const o=getOrder(no),h=getHouse(o.houseId),u=getUser(o.userId);showModal('订单详情',`<div class="grid cols-2"><div><div class="kv"><b>订单号</b><span>${o.orderNo}</span></div><div class="kv"><b>状态</b><span>${statusPill(o.status)}</span></div><div class="kv"><b>用户</b><span>${u?.name||o.guestName}</span></div><div class="kv"><b>手机号</b><span>${maskPhone(o.phone)}</span></div></div><div><div class="kv"><b>房源</b><span>${h?.name||'房源已删除'}</span></div><div class="kv"><b>入住</b><span>${o.checkIn} 至 ${o.checkOut}</span></div><div class="kv"><b>金额</b><span>${money(o.amount)}</span></div><div class="kv"><b>备注</b><span>${esc(o.note||'无')}</span></div></div></div>`, `<button class="btn ghost" onclick="closeModal()">关闭</button>`)}
function renderAdminReviews(){
  let list=reviews.filter(r=>App.adminFilters.reviewStatus==='全部'||r.status===App.adminFilters.reviewStatus); const p=paginate(list,App.adminPages.reviews,20); App.adminPages.reviews=p.page;
  return `<div class="page-title"><div><h1>评价管理</h1><p>支持状态筛选、回复评价、显示/隐藏切换与删除。</p></div></div><div class="filter-panel"><div class="grid cols-4"><div class="field"><label>状态</label><select id="reviewStatus"><option>全部</option><option ${App.adminFilters.reviewStatus==='显示'?'selected':''}>显示</option><option ${App.adminFilters.reviewStatus==='隐藏'?'selected':''}>隐藏</option></select></div><div class="field"><label>&nbsp;</label><button class="btn primary" onclick="App.adminFilters.reviewStatus=$('reviewStatus').value;App.adminPages.reviews=1;render(false)">筛选</button></div></div></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>房源/订单</th><th>用户</th><th>评分</th><th>内容</th><th>状态</th><th>操作</th></tr></thead><tbody>${p.items.map(r=>`<tr><td>${r.id}</td><td>${getHouse(r.houseId)?.name||'房源已删除'}<br><span class="muted">${r.orderNo}</span></td><td>${r.userName}</td><td>⭐ ${r.rating}</td><td style="max-width:260px">${esc(r.content)}${r.reply?`<br><span class="muted">回复：${esc(r.reply)}</span>`:''}</td><td><span class="tag ${r.status==='显示'?'green':'gray'}">${r.status}</span></td><td><div class="row"><button class="btn blue small" onclick="replyReview(${r.id})">回复</button><button class="btn amber small" onclick="toggleReviewStatus(${r.id})">${r.status==='显示'?'隐藏':'显示'}</button><button class="btn red small" onclick="deleteReview(${r.id})">删除</button></div></td></tr>`).join('')}</tbody></table></div>${paginationHtml('reviews',p.page,p.total)}`;
}
function replyReview(id){const r=reviews.find(x=>x.id===id);showModal('回复评价',`<div class="hint">${esc(r.content)}</div><div class="field mt16"><label>回复内容</label><textarea id="reviewReply">${esc(r.reply||'')}</textarea></div>`,`<button class="btn ghost" onclick="closeModal()">取消</button><button class="btn primary" onclick="saveReviewReply(${id})">保存回复</button>`)}
function saveReviewReply(id){const r=reviews.find(x=>x.id===id);r.reply=$('reviewReply').value.trim();r.replyTime=today+' 12:00';closeModal();showToast('评价回复已保存');render(false)}
function toggleReviewStatus(id){const r=reviews.find(x=>x.id===id);r.status=r.status==='显示'?'隐藏':'显示';recalcHouseRating(r.houseId);showToast('评价状态已切换');render(false)}
function deleteReview(id){confirmAction('确认删除该评价？删除后需要重新计算房源评分。',()=>{const r=reviews.find(x=>x.id===id);reviews=reviews.filter(x=>x.id!==id);if(r)recalcHouseRating(r.houseId);showToast('评价已删除');render(false)})}
function renderAdminUsers(){
  const kw=App.adminFilters.userKeyword.toLowerCase(); let list=users.filter(u=>!kw||[u.username,u.name,u.phone,String(u.id)].join(' ').toLowerCase().includes(kw)); const p=paginate(list,App.adminPages.users,20); App.adminPages.users=p.page;
  return `<div class="page-title"><div><h1>用户管理</h1><p>支持用户名、手机号、ID搜索，查看用户信息，禁用/启用用户。</p></div></div><div class="filter-panel"><div class="grid cols-4"><div class="field"><label>关键词</label><input id="userKw" value="${esc(App.adminFilters.userKeyword)}" placeholder="用户名/手机号/ID"></div><div class="field"><label>&nbsp;</label><button class="btn primary" onclick="App.adminFilters.userKeyword=$('userKw').value.trim();App.adminPages.users=1;render(false)">搜索</button></div><div class="field"><label>&nbsp;</label><button class="btn ghost" onclick="App.adminFilters.userKeyword='';render(false)">重置</button></div></div></div><div class="table-wrap"><table><thead><tr><th>ID</th><th>用户</th><th>手机号</th><th>注册时间</th><th>订单数</th><th>状态</th><th>操作</th></tr></thead><tbody>${p.items.map(u=>`<tr><td>${u.id}</td><td><b>${u.name}</b><br><span class="muted">${u.username}</span></td><td>${maskPhone(u.phone)}</td><td>${u.regTime}</td><td>${orders.filter(o=>o.userId===u.id).length}</td><td><span class="tag ${u.status==='正常'?'green':'red'}">${u.status}</span></td><td><div class="row"><button class="btn ghost small" onclick="showUserDetail(${u.id})">查看</button><button class="btn ${u.status==='正常'?'red':'green'} small" onclick="toggleUser(${u.id})">${u.status==='正常'?'禁用':'启用'}</button></div></td></tr>`).join('')}</tbody></table></div>${paginationHtml('users',p.page,p.total)}`;
}
function showUserDetail(id){const u=getUser(id);showModal('用户信息',`<div class="profile-head"><div class="avatar">${esc(u.avatar)}</div><div><h2>${esc(u.name)}</h2><p class="muted">${esc(u.username)} · ${maskPhone(u.phone)}</p></div></div><div class="grid cols-2 mt16"><div class="kv"><b>ID</b><span>${u.id}</span></div><div class="kv"><b>状态</b><span>${u.status}</span></div><div class="kv"><b>注册时间</b><span>${u.regTime}</span></div><div class="kv"><b>订单数</b><span>${orders.filter(o=>o.userId===u.id).length}</span></div></div>`, `<button class="btn ghost" onclick="closeModal()">关闭</button>`)}
function toggleUser(id){const u=getUser(id);confirmAction(`确认${u.status==='正常'?'禁用':'启用'}用户 ${u.name}？`,()=>{u.status=u.status==='正常'?'禁用':'正常';showToast('用户状态已更新');render(false)})}
function renderConfig(){return `<div class="page-title"><div><h1>系统配置</h1><p>维护城市、设施标签和平台规则参数。</p></div><button class="btn primary" onclick="saveRules()">保存规则</button></div><div class="grid cols-2"><section class="card pad"><div class="between"><h2>城市管理</h2><button class="btn ghost small" onclick="addCity()">新增城市</button></div><div class="field mt12"><label>城市名称</label><input id="newCity" placeholder="如：重庆"></div><div class="tags mt16">${config.cities.map(c=>`<span class="tag brand">${c} <button class="pill-link" onclick="deleteCity('${c}')">×</button></span>`).join('')}</div></section><section class="card pad"><div class="between"><h2>设施标签管理</h2><button class="btn ghost small" onclick="addTag()">新增标签</button></div><div class="field mt12"><label>标签名称</label><input id="newTag" placeholder="如：泳池"></div><div class="tags mt16">${config.tags.map(t=>`<span class="tag">${t} <button class="pill-link" onclick="deleteTag('${t}')">×</button></span>`).join('')}</div></section></div><section class="section card pad"><h2>平台规则设置</h2><div class="grid cols-4 mt16"><div class="field"><label>默认优惠金额（元）</label><input id="cfgDiscount" type="number" value="${config.defaultDiscount}"></div><div class="field"><label>待支付超时（分钟）</label><input id="cfgPay" type="number" value="${config.payTimeout}"></div><div class="field"><label>最晚免费取消（小时）</label><input id="cfgCancel" type="number" value="${config.freeCancelHours}"></div><div class="field"><label>评价入口保留（天）</label><input id="cfgReview" type="number" value="${config.reviewDays}"></div></div><div class="hint mt16">默认配置：优惠30元、待支付超时30分钟、入住前24小时免费取消、离店后30天保留评价入口。</div></section>`}
function addCity(){const v=$('newCity').value.trim();if(!v){showToast('请输入城市名称','err');return}if(config.cities.includes(v)){showToast('城市已存在','warn');return}config.cities.push(v);showToast('城市已新增');render(false)}
function deleteCity(c){confirmAction('确认删除城市 '+c+'？',()=>{config.cities=config.cities.filter(x=>x!==c);showToast('城市已删除');render(false)})}
function addTag(){const v=$('newTag').value.trim();if(!v){showToast('请输入标签名称','err');return}if(config.tags.includes(v)){showToast('标签已存在','warn');return}config.tags.push(v);showToast('标签已新增');render(false)}
function deleteTag(t){confirmAction('确认删除设施标签 '+t+'？',()=>{config.tags=config.tags.filter(x=>x!==t);houses.forEach(h=>h.facilities=h.facilities.filter(x=>x!==t));showToast('标签已删除');render(false)})}
function saveRules(){config.defaultDiscount=Number($('cfgDiscount').value||0);config.payTimeout=Number($('cfgPay').value||30);config.freeCancelHours=Number($('cfgCancel').value||24);config.reviewDays=Number($('cfgReview').value||30);showToast('系统配置已保存');render(false)}
render(false);
</script>
</body>
</html>
